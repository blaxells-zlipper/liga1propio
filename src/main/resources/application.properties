spring.application.name=liga1pro-backend

spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=${PORT:8080}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Runtime profile
spring.profiles.default=supabase

# API-Football
api.football.base-url=https://v3.football.api-sports.io
api.football.key=${API_FOOTBALL_KEY:adc7d9508a5410d4594d42816cd737e4}
api.football.league-id=281
api.football.season=2024
api.football.cache-minutes=60
api.football.cache-file=data/api-football-cache.json

# NewsAPI
news.api.base-url=https://newsapi.org/v2
news.api.key=${NEWS_API_KEY:25625a4b48c6459289141facbf45dc19}
news.api.cache-file=data/news-cache.json
news.api.cache-minutes=15
news.api.stale-hours=24
news.api.refresh-interval-ms=300000
news.api.refresh-initial-delay-ms=60000
