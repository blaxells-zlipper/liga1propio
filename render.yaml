services:
  - type: web
    name: liga1pro-backend
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    healthCheckPath: /api/partidos
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: supabase
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
